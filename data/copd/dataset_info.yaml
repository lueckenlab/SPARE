id: copd

# This dataset was processed before the per-dataset dataset_info.yaml
# refactor. The cleaned/processed/representations h5ads on disk date
# from Feb 2025; no `raw`/`cleaned` artefacts exist locally. Re-running
# clean_data/preprocess for copd is out of scope for the current
# evaluation pass.

files:
  processed: COPD_processed.h5ad
  metadata: COPD_metadata_benchmark.csv
  representations: copd_representations.h5ad

keys:
  sample: sample_id
  cell_type: cell_type_reannotated
  batch: batch
  batch_covariates:
    - sample_id
    - batch

# Column names in this section reflect what's ACTUALLY in
# COPD_processed.h5ad obs (verified via h5py inspection 2026-05-28).
# Prior versions of this file used canonicalised names (Bronchodilator_Use,
# Smoking_Status, GOLD_Stage, etc.) that do not exist in the on-disk h5ad;
# those references were corrected here. If clean_data/preprocess is
# re-run with a fresh column-naming pass, restore the canonical names.
metadata:
  samples_metadata_cols:
    - Subjet_Lobe_Specific
    - batch
    - Smoke
    - GOLD
    - Age
    - Sex
    - FEV1
    - FEV1.FVC
    - Bronchodilator
    - Leukotriene
    - Steroids
    - Lobe
    - CANCER
    - lobeemph
    - lobegroup
    - PackYear
    - Disease
    - Disease2
  accessible_metadata_columns:
    - Age
    - Sex
    - Smoking_Status
    - Pack_Year
    - Bronchodilator_Use
    - Leukotriene_Use
    - Steroid_Use
    - Disease
    - Disease_2
    - Condition_Coarse

preprocess:
  sample_size_threshold: 100
  output_compression: gzip

evaluate:
  benchmark_schema: benchmark_schema.json
  # Healthy 23 y/o non-smoker male — same root used in src/evaluate/params.yaml.
  root_sample: UA65_Batch1
  trajectory_variable: GOLD_Stage
  inverse_trajectory: false
  figure_format: png
