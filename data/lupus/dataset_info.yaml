id: lupus

source:
  type: cxg
  # Perez et al. 2022 "Single-cell RNA-seq reveals cell type-specific molecular
  # and genetic associations to lupus" — 1.26M PBMCs. Verified 2026-05-23 via
  # the CELLxGENE Discover curation API; the previous id (6e65a13e-...) is not
  # present in the current Discover index of 2124 datasets. Collection id:
  # 436154da-bcf1-4130-9c8b-120ff9a888f2.
  cxg_id: 218acb0f-9f2f-4f76-b90b-15a4b7c7f629

files:
  raw: lupus.h5ad
  cleaned: lupus_cleaned.h5ad
  processed: lupus_processed.h5ad
  metadata: lupus_metadata.csv
  representations: lupus_representations.h5ad

keys:
  sample: ind_cov_batch_cov
  cell_type: ct_cov
  batch: Processing_Cohort
  batch_covariates:
    - ind_cov_batch_cov
    - Processing_Cohort

metadata:
  samples_metadata_cols:
    - Processing_Cohort
    - development_stage
    - sex
    - self_reported_ethnicity
    # Clinical columns merged in by src/clean_data/lupus/script.py from the
    # UCSF Box clinical spreadsheet.
    - disease
    - disease_state
    - sledaiscore
    - kidney
    # Sample-level derived columns (added by clean_data; existing artifacts
    # patched in-place by scripts/patch_lupus_metadata.py).
    - disease_status
    - flare_status
    - age
    - replicate
  accessible_metadata_columns:
    - age
    - sex
    - self_reported_ethnicity
    - sledaiscore
    - kidney
    - Processing_Cohort

preprocess:
  sample_size_threshold: 100
  output_compression: gzip

evaluate:
  benchmark_schema: benchmark_schema.json
  # Healthy control sample — picked deterministically as the lexicographically
  # first HC in the cohort.
  root_sample: HC-006_4.0
  trajectory_variable: age
  inverse_trajectory: false
  figure_format: png
