id: sea_ad_dlpfc

# SEA-AD (Seattle Alzheimer's Disease Brain Cell Atlas), Gabitto et al.
# 2024 — dorsolateral prefrontal cortex (DLPFC) expansion region.
# CELLxGENE "Whole Taxonomy - DLPFC" (all cell types).
#
# 1,395,601 nuclei x 35,483 genes, 83 donors spanning the AD continuum
# (one sample = one donor). snRNA-seq, 10x 3' v3 + 10x multiome.
# Shares the obs schema and cleaning component (clean_sea_ad) with
# sea_ad_mtg.
source:
  type: cxg
  cxg_id: 6f7fd0f1-a2ed-4ff1-80d3-33dde731cbc3
  # Collection 1ca90a2d-2943-483d-b678-b809bf464c30.

files:
  raw: sea_ad_dlpfc.h5ad
  cleaned: sea_ad_dlpfc_cleaned.h5ad
  processed: sea_ad_dlpfc_processed.h5ad
  metadata: sea_ad_dlpfc_metadata.csv
  representations: sea_ad_dlpfc_representations.h5ad

keys:
  sample: donor_id
  cell_type: Subclass          # 24 author labels; Class(3) too coarse, Supertype(131) too fine
  batch: assay                 # 10x 3' v3 vs 10x multiome (only technical covariate)
  batch_covariates:
    - donor_id
    - assay

metadata:
  samples_metadata_cols:
    - disease
    - sex
    - Neurotypical reference
    - Cognitive status
    - ADNC
    - Braak stage
    - Thal phase
    - CERAD score
    - APOE4 status
    - Age at death
    - Years of education
    - PMI
    - Lewy body disease pathology
    - LATE-NC stage
    - Microinfarct pathology
    - self_reported_ethnicity
    - development_stage
    - age
    - adnc_score
    - braak_score
    - cerad_score
    - thal_score
  # Antemortem-knowable clinical features for the ehrapy baseline. The
  # neuropathology scores (ADNC/Braak/CERAD/Thal) require autopsy, so they
  # stay in .obs as evaluation targets rather than "accessible" features.
  accessible_metadata_columns:
    - sex
    - Age at death
    - APOE4 status
    - Cognitive status

preprocess:
  sample_size_threshold: 100
  output_compression: gzip

evaluate:
  benchmark_schema: benchmark_schema.json
  # AD neuropathologic-change continuum: Not AD(0) -> Low(1) ->
  # Intermediate(2) -> High(3), encoded as adnc_score.
  trajectory_variable: adnc_score
  # root_sample: a Not-AD donor (adnc_score==0); deterministic first of
  # the 12 Not-AD DLPFC donors.
  root_sample: H18.30.002
  inverse_trajectory: false
  figure_format: png
