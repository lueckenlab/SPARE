name: download_datasets
description: |
  Download all datasets used in the benchmark
arguments:
  - type: file
    name: --dataset_info
    description: |
      Path to dataset_info.yaml. When set, fills in --input/--source/--output
      from info.source.{type,url,cxg_id} and info.files.raw. Individual args
      below still win if explicitly provided.
    direction: input
    required: false
  - type: string
    name: --input
    description: Link or CXG id of the dataset to download. Derived from dataset_info when omitted.
    direction: input
    required: false
  - type: string
    name: --source
    description: Where to download from. Derived from dataset_info when omitted.
    direction: input
    required: false
    choices: [ "web", "cxg" ]
  - type: file
    name: --output
    description: The path of the output file. Derived from dataset_info when omitted.
    direction: output
    default: "data/dataset.h5ad"
  - type: integer
    name: --max_chunks
    description: The maximum number of chunks to download (128KB each). Used for test purposes
    direction: input
    required: false

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

dependencies: 
  - name: download_from_cxg
    repository: local
  - name: download_from_web
    repository: local

repositories:
  - name: local
    type: local
runners:
  - type: nextflow
