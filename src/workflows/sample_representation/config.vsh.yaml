name: sample_representation
description: |
  Run sample representation methods, aggregate results in anndata object
arguments:
  - type: file
    name: --dataset_info
    description: |
      Path to dataset_info.yaml. When set, fills in --input, --metadata_path,
      --cell_type_key, --sample_key, --accessible_metadata_columns, --output
      from the dataset_info file. Individual args below still win if
      explicitly provided.
    direction: input
    required: false

  - type: file
    name: --input
    description: Processed h5ad. Derived from dataset_info when omitted.
    direction: input
    required: false
    example: "data/combat/combat_processed.h5ad"

  - type: file
    name: --metadata_path
    description: Sample-level metadata CSV. Derived from dataset_info when omitted.
    direction: input
    required: false
    example: "data/combat/metadata.csv"

  - type: string
    name: --cell_type_key
    description: Cell type column in .obs. Derived from dataset_info when omitted.
    required: false
    example: "cell_type"

  - type: string
    name: --sample_key
    description: Sample column in .obs. Derived from dataset_info when omitted.
    required: false
    example: "scRNASeq_sample_ID"

  - type: string
    name: --accessible_metadata_columns
    multiple: true
    description: Columns used to build the metadata baseline representation. Derived from dataset_info when omitted.
    required: false
    example: "Age,Sex,BMI,HospitalstaySARSCoV2PCR,TimeSinceOnset"

  - type: file
    name: --output
    description: Output h5ad with aggregated sample representations. Derived from dataset_info when omitted.
    direction: output
    required: false
    example: "data/combat/combat_representations.h5ad"

  - type: file
    name: --method_params
    description: YAML mapping method → experiment-name → params dict.
    direction: input
    required: true
    example: "experiments.yaml"

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf

dependencies: 
  - name: aggregate_representations
    repository: local
  - name: mrvi
    repository: local
  - name: pseudobulk
    repository: local
  - name: random_vector
    repository: local
  - name: scpoli
    repository: local
  - name: grouped_pseudobulk
    repository: local
  - name: pilot
    repository: local
  - name: mofa
    repository: local
  - name: gloscope
    repository: local
  - name: cell_group_composition
    repository: local

repositories:
  - name: local
    type: local
    
runners:
  - type: nextflow
    directives:
      label: [veryhighmem, highcpu]
