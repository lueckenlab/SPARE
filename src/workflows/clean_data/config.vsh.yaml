name: clean_data
description: |
  Perform dataset-specific preprocessing for the benchmark. For example,
  clean the data from unannotated cells or convert some columns to a better format.
arguments:
  - type: file
    name: --dataset_info
    description: |
      Path to dataset_info.yaml. When set, fills in --input/--output/
      --output_compression from info.files.{raw,cleaned} and
      info.preprocess.output_compression. Individual args below still win
      if explicitly provided.
    direction: input
    required: false
  - type: file
    name: --input
    description: Path to the dataset to clean. Derived from dataset_info when omitted.
    direction: input
    required: false
    example: "data/combat/combat.h5ad"
  - type: file
    name: --output
    description: The path of the output file. Derived from dataset_info when omitted.
    direction: output
    required: false
    example: "data/combat/combat_clean.h5ad"
  - type: string
    name: --output_compression
    description: The compression to use for the output file
    required: false
    example: "gzip"
    default: "gzip"
resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - path: ../utils/dataset_info.nf

dependencies:
  - name: clean_combat
    repository: local
  - name: clean_stephenson
    repository: local
  - name: clean_hlca
    repository: local
  - name: clean_onek1k
    repository: local
  - name: clean_ticatlas
    repository: local
  - name: clean_lupus
    repository: local
  - name: clean_imm_of_aging
    repository: local
  - name: clean_sound_life
    repository: local

repositories:
  - name: local
    type: local
runners:
  - type: nextflow
