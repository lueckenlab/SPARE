name: gloscope
description: >
  Apply GloScope sample representation method

arguments:
  - type: file
    name: --input
    description: Path to the input data
    direction: input
    required: true
    example: "combat_processed.h5ad"

  - type: file
    name: --output
    description: Path to save the sample representations
    direction: output
    required: true
    example: "combat_pseudobulk_pca.h5ad"

  - type: string
    name: --sample_key
    description: Column name containing sample identifiers
    required: true
    example: "scRNASeq_sample_ID"

  - type: string
    name: --cell_type_key
    description: Column name containing cell type identifiers
    required: true
    example: "Annotation_major_subset"

  - type: string
    name: --layer
    description: Layer to use for aggregating cell data
    required: true
    example: "X_pca"

  - type: boolean
    name: --use_gpu
    description: Run the GloScope_py kNN density estimation on GPU via cuML (requires the gloscope env's CUDA stack).
    required: false
    default: true

  - type: integer
    name: --n_components
    description: |
      Number of components to subset the embedding layer to.
      Significant speed-up when set to a lower number, but not applicable for all methods.
    required: false
    example: 10

resources:
  - type: python_script
    path: script.py

engines:
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [veryhighmem, gpu]
      # GloScope_py(use_gpu=True) needs cuML, which isn't in the shared
      # sample_representation_benchmark env. Activate the dedicated GPU env
      # (patpy 0.16.5 + cuml 26.04.0) for this component only — same pattern
      # as pilot_gm_vae.
      beforeScript: "source /home/icb/vladimir.shitov/software/miniconda3/etc/profile.d/conda.sh && conda activate patpy-benchmark-tutorial-gpu"
