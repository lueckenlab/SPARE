name: cell_group_composition
description: >
  Count proportions of cell types per sample and calculate distances between composition vectors

arguments:
  - type: file
    name: --input
    description: Path to the input data
    direction: input
    required: true
    example: "combat_processed.h5ad"

  - type: file
    name: --output
    description: Path to save the sample representations
    direction: output
    required: true
    example: "combat_composition.csv"

  - type: string
    name: --sample_key
    description: Column name containing sample identifiers
    required: true
    example: "scRNASeq_sample_ID"

  - type: string
    name: --cell_type_key
    description: Column name containing cell type identifiers
    required: true
    example: "Annotation_major_subset"

  - type: string
    name: --distance_metric
    description: Distance metric to use
    required: false
    default: "euclidean"
    choices: ["euclidean", "cosine", "cityblock"]

  - type: boolean
    name: --apply_clr
    description: Apply centered log-ratio (CLR) transformation to composition vectors before computing distances.
    required: false
    default: false

  - type: double
    name: --pseudocount
    description: Pseudocount added before the CLR transform to avoid log(0). Only used when --apply_clr is true.
    required: false
    default: 1.0

resources:
  - type: python_script
    path: script.py

engines:
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
        label: [singlecpu]
