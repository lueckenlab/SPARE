name: clean_myocardial_infarction
description: Dataset specific preprocessing steps for the Kuppe et al. 2022 human myocardial infarction snRNA-seq atlas.
arguments:
  - name: --input
    description: The path of the input file
    type: file
    example: data/myocardial_infarction/myocardial_infarction.h5ad
    required: true
    direction: input
  - name: --output
    description: The path of the output file
    type: file
    example: data/myocardial_infarction/myocardial_infarction_cleaned.h5ad
    default: data/myocardial_infarction/myocardial_infarction_cleaned.h5ad
    direction: output
  - name: --output_compression
    description: The compression format of the output file
    type: string
    example: gzip
    required: false

resources:
  - type: python_script
    path: script.py

engines:
  - type: native
runners:
  - type: executable
  - type: nextflow
